spring.application.name=spring-secure-identity-api
server.port=8081
spring.config.import=optional:file:.env

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/ssi_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
